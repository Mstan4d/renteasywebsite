<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact RentEasy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar"><div class="container nav-container"><a href="index.html" class="logo"><span>Rent<span>Easy</span></span></a><div class="nav-menu"><a href="index.html#how-it-works" class="nav-link">How It Works</a><a href="index.html#faq" class="nav-link">FAQ</a><a href="contact.html" class="nav-link active">Contact</a></div><button class="hamburger" id="hamburger"><i class="fas fa-bars"></i></button></div></nav>
    <section class="section"><div class="container"><h2 class="center">Contact Us</h2><div style="max-width: 600px; margin: 0 auto;"><form id="contactForm"><div class="form-group"><input type="text" name="name" placeholder="Your Name" required></div><div class="form-group"><input type="email" name="email" placeholder="Email Address" required></div><div class="form-group"><input type="text" name="subject" placeholder="Subject"></div><div class="form-group"><textarea name="message" rows="5" placeholder="Your message..." required></textarea></div><button type="submit" class="btn btn-primary">Send Message</button></form></div></div></section>
    <footer class="footer"><div class="container"><div class="footer-bottom"><p>&copy; 2025 RentEasy</p></div></div></footer>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://zbehpghfgkxqxhgqyyqv.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpiZWhwZ2hmZ2t4cXhoZ3F5eXF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk1Mjc4OTksImV4cCI6MjA4NTEwMzg5OX0.RaFOsWfPGTkxfAnnrICnSYWQIAHdQBZrzgTi37R8xTQ';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        document.getElementById('contactForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = { created_at: new Date().toISOString() };
            new FormData(e.target).forEach((val, key) => formData[key] = val);
            const btn = e.target.querySelector('button');
            btn.disabled = true; btn.textContent = 'Sending...';
            const { error } = await supabase.from('contact_submissions').insert([formData]);
            if(error) alert('Error: '+error.message);
            else { alert('Message sent!'); e.target.reset(); }
            btn.disabled = false; btn.textContent = 'Send Message';
        });
    </script>
</body>
</html>
